spring.application.name=ecommerce

# Local H2 database
spring.datasource.url=jdbc:h2:mem:ecommerce;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Redis defaults for OTP storage
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.repositories.enabled=false

# Payment provider: use "mock" for local development, "razorpay" for real checkout.
app.payment.provider=mock
app.razorpay.key-id=
app.razorpay.key-secret=
app.razorpay.currency=INR

# Google OAuth: set verify-token=true and configure client-id for production.
app.google.verify-token=false
app.google.client-id=

# Development admin bootstrap. Override with environment-specific values before production.
app.admin.email=admin@shop.com
app.admin.password=admin123
app.admin.phone=7000000000
